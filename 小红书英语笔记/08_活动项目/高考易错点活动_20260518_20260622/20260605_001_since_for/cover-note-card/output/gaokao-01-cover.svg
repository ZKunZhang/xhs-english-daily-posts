<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <pattern id="paperDots" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#3a2e20" opacity="0.10"/>
    </pattern>
    <pattern id="ruledLines" width="1080" height="72" patternUnits="userSpaceOnUse">
      <line x1="0" y1="71" x2="1080" y2="71" stroke="#e7ddc9" stroke-width="2" opacity="0.70"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="12" stdDeviation="0" flood-color="#202124" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1080" height="1440" fill="#fffaf0"/>
  <rect width="1080" height="1440" fill="url(#ruledLines)"/>
  <rect width="1080" height="1440" fill="url(#paperDots)" opacity="0.55"/>
  <circle cx="206" cy="188" r="210" fill="#ffe680" opacity="0.22"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif">
    <g transform="translate(84 88)">
      <rect x="0" y="0" width="156" height="52" rx="8" fill="#fff4cf" stroke="#202124" stroke-width="3"/>
      <text x="78" y="36" text-anchor="middle" font-size="30" font-weight="800" fill="#202124">高考易错</text>
      <text x="912" y="36" text-anchor="end" font-size="30" font-weight="600" fill="#6b6257">英语错题笔记 01</text>
    </g>

    <g transform="translate(84 210)">
      <text x="0" y="0" font-size="78" font-weight="900" fill="#202124">I have lived here</text>
      <line x1="668" y1="-10" x2="902" y2="-10" stroke="#2f6fbd" stroke-width="10" stroke-linecap="round"/>
      <text x="0" y="102" font-size="78" font-weight="900" fill="#202124">2020.</text>
      <text x="0" y="178" font-size="38" font-weight="650" fill="#6b6257">这里到底填 since 还是 for？</text>
    </g>

    <g transform="translate(84 505)" filter="url(#softShadow)">
      <rect x="0" y="0" width="912" height="390" rx="14" fill="#fffdf7" stroke="#202124" stroke-width="4"/>
      <text x="44" y="72" font-size="44" font-weight="850" fill="#202124">选一个最容易写反的：</text>

      <g transform="translate(44 122)">
        <rect x="0" y="0" width="392" height="126" rx="12" fill="#f8efdf" stroke="#e3d5bd" stroke-width="3"/>
        <text x="196" y="78" text-anchor="middle" font-size="48" font-weight="900" fill="#202124">A. since</text>
      </g>

      <g transform="translate(476 122)">
        <rect x="0" y="0" width="392" height="126" rx="12" fill="#f8efdf" stroke="#e3d5bd" stroke-width="3"/>
        <text x="196" y="78" text-anchor="middle" font-size="48" font-weight="900" fill="#202124">B. for</text>
      </g>

      <g transform="translate(44 286)">
        <rect x="0" y="0" width="868" height="1" fill="#eadfcf"/>
        <text x="0" y="56" font-size="38" font-weight="750" fill="#d9483b">别急着选，看后面是时间点还是时间段。</text>
      </g>
    </g>

    <g transform="translate(84 980)">
      <rect x="0" y="0" width="912" height="150" rx="12" fill="#fff7db" stroke="#ffe680" stroke-width="5"/>
      <text x="38" y="58" font-size="38" font-weight="850" fill="#202124">考前速记</text>
      <text x="38" y="112" font-size="42" font-weight="900" fill="#2f6fbd">since + 时间点</text>
      <text x="430" y="112" font-size="42" font-weight="900" fill="#d9483b">for + 时间段</text>
    </g>

    <g transform="translate(84 1195)">
      <path d="M0 0 C80 30, 150 30, 245 0" fill="none" stroke="#d9483b" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
      <text x="0" y="82" font-size="34" font-weight="700" fill="#6b6257">看着会，其实考试最容易错</text>
      <text x="912" y="82" text-anchor="end" font-size="30" font-weight="650" fill="#6b6257">save for review</text>
      <line x1="0" y1="122" x2="912" y2="122" stroke="#e7ddc9" stroke-width="2"/>
    </g>
  </g>
</svg>
