<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zhongkao Note Card</title>
  <style>
    :root {
      --paper: #fffaf0;
      --ink: #202124;
      --muted: #6b6257;
      --line: #e8dcc8;
      --red: #d9483b;
      --blue: #2f6fbd;
      --yellow: #ffe680;
      --green: #2f9e68;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ddd6ca;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
    }

    .deck {
      display: grid;
      gap: 32px;
      padding: 32px;
    }

    .poster {
      position: relative;
      width: 1080px;
      height: 1440px;
      overflow: hidden;
      padding: 88px 84px 96px;
      background:
        linear-gradient(rgba(255,255,255,.45) 1px, transparent 1px) 0 0 / 100% 72px,
        radial-gradient(circle at 20% 18%, rgba(255,232,128,.22), transparent 22%),
        var(--paper);
      border: 1px solid rgba(60, 48, 32, .08);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image: radial-gradient(rgba(40, 32, 20, .08) .8px, transparent .8px);
      background-size: 12px 12px;
      mix-blend-mode: multiply;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 34px;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 30px;
      line-height: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 0 20px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #fff6d9;
      font-weight: 700;
      color: var(--ink);
    }

    .title {
      margin: 0;
      font-size: 84px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 900;
    }

    .title .red { color: var(--red); }
    .title .blue { color: var(--blue); }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 38px;
      line-height: 1.35;
      font-weight: 600;
    }

    .question {
      margin-top: 24px;
      padding: 44px;
      border: 3px solid var(--ink);
      border-radius: 12px;
      background: rgba(255, 255, 255, .68);
      box-shadow: 10px 10px 0 rgba(32, 33, 36, .1);
    }

    .question-main {
      font-size: 58px;
      line-height: 1.22;
      font-weight: 850;
    }

    .blank {
      display: inline-block;
      min-width: 180px;
      border-bottom: 8px solid var(--blue);
      transform: translateY(-8px);
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 36px;
    }

    .choice {
      padding: 20px 22px;
      border-radius: 10px;
      background: #f7efe0;
      border: 2px solid var(--line);
      font-size: 38px;
      font-weight: 800;
      text-align: center;
    }

    .note {
      padding: 36px;
      border-left: 14px solid var(--yellow);
      background: rgba(255, 255, 255, .62);
      font-size: 40px;
      line-height: 1.45;
      font-weight: 650;
    }

    .compare {
      display: grid;
      gap: 22px;
    }

    .row {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 22px;
      align-items: start;
      padding: 28px 30px;
      border: 2px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, .58);
    }

    .mark {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 42px;
      font-weight: 900;
      color: white;
    }

    .mark.ok { background: var(--green); }
    .mark.no { background: var(--red); }

    .row-text {
      font-size: 40px;
      line-height: 1.35;
      font-weight: 700;
    }

    .small {
      margin-top: 8px;
      color: var(--muted);
      font-size: 32px;
      line-height: 1.35;
      font-weight: 500;
    }

    .footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 28px;
      border-top: 2px solid var(--line);
      padding-top: 22px;
    }
  </style>
</head>
<body>
  <main class="deck">
    <section class="poster">
      <div class="content">
        <div class="topline">
          <span class="badge">中考易错</span>
          <span>英语错题笔记 01</span>
        </div>
        <h1 class="title">Don't forget <span class="blank"></span><br>the door</h1>
        <p class="subtitle">before you leave.</p>
        <div class="question">
          <div class="question-main">这里应该填哪个？</div>
          <div class="choices">
            <div class="choice">closing</div>
            <div class="choice">to close</div>
          </div>
        </div>
        <div class="footer">
          <span>看着会，其实容易错</span>
          <span>save for review</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
